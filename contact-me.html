<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="icon" href="https://github.com/moxi-u7/moxi-u7.github.io/raw/main/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rubik', sans-serif; background-color: #000000; color: #eee; line-height: 1.6; margin: 0; padding: 0; animation: fadeIn 1s ease-in-out; }
        h1, h2, h3 { color: #fff; }
        a { text-decoration: none; color: #db9abf; }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        section { padding: 50px 0; text-align: center; }
        footer { background-color: #000000; text-align: center; padding: 20px; color: #fff; }
        footer p { font-size: 14px; }
        .back-to-home { margin: 20px; text-align: center; }
        .back-to-home a { color: #db9abf; font-size: 20px; text-decoration: none; font-weight: bold; padding: 10px; display: inline-block; }
        .back-to-home a:hover { color: #35252b; }

        /* Adjusted margin to make icons closer */
        .socials a { color: #db9abf; font-size: 20px; margin: 0 6px; display: inline-block; transition: color 0.3s; padding: 4px 10px; }
        .socials a:hover { color: #35252b; }

        /* Target the specific Twitter link */
        .socials a[href="https://x.com/moxiudev"] {
            padding-left: 4px; /* Reduce left padding to make it closer to Steam */
            padding-right: 4px; /* Reduce right padding */
        }

        .socials .material-icons { vertical-align: middle; }
    </style>
</head>
<body>

<!-- Back to Home Link -->
<div class="back-to-home">
    <a href="index.html">&gt; Back to Home</a>
</div>

<!-- Contact Section -->

    <div class="socials">
        <a href="https://www.reddit.com/user/M0xiu1337/" target="_blank">
            <span class="material-icons">forum</span> Reddit
        </a>
        <a href="https://steamcommunity.com/id/Moxiu-u7/" target="_blank">
            <span class="material-icons">games</span> Steam
        </a>
        <a href="https://x.com/moxiudev" target="_blank">
            <span class="material-icons">twitter</span> Twitter (X)
        </a>
        <!-- Added GitHub link here -->
        <a href="https://github.com/moxi-u7/" target="_blank">
            <span class="material-icons">code</span> GitHub
        </a>
        <a href="https://www.example.com" target="_blank">
            <span class="material-icons">web</span> Itch.io
        </a>
        <a href="mailto:moxi-u7@onet.eu">
            <span class="material-icons">email</span> Email Me
        </a>
    </div>
</section>

<!-- Footer Section -->
<footer>
