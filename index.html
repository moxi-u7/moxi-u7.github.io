<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Moxiu's Portfolio</title>
    <link rel="icon" href="https://github.com/moxi-u7/moxi-u7.github.io/raw/main/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Global reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rubik', sans-serif; background-color: #000000; color: #eee; line-height: 1.6; margin: 0; padding: 0; animation: fadeIn 1s ease-in-out; }
        h1, h2, h3 { color: #fff; }
        a { text-decoration: none; color: #db9abf; }
        
        /* FadeIn animation for smooth loading */
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        
        /* Main content sections */
        section { padding: 50px 0; text-align: center; }
        footer { background-color: #000000; text-align: center; padding: 20px; color: #fff; }
        footer p { font-size: 14px; }
        
        /* Button styling */
        .buttons { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .button { padding: 12px 30px; background-color: #db9abf; color: white; border-radius: 5px; font-size: 16px; transition: background-color 0.3s; }
        .button:hover { background-color: #35252b; }
        
        /* Social media link styling */
        .socials a { color: #db9abf; font-size: 20px; margin: 0 8px; display: inline-block; transition: color 0.3s; }
        .socials a:hover { color: #35252b; }
        .socials .material-icons { vertical-align: middle; }

    </style>
</head>
<body>

<!-- Home Page Content -->
<section>
    <h1>Welcome to my portfolio!</h1>
    <p>btw checkout all my project on github</p>
    <div class="buttons">
        <a href="projects.html" class="button">View My Projects</a>
        <a href="about-me.html" class="button">About Me</a>
        <a href="contact-me.html" class="button">Contact Me</a>
    </div>
</section>

<!-- Footer Section -->
<footer>
    <p>&copy; 2024 Moxiu. All rights reserved.</p>
</footer>

</body>
</html>
